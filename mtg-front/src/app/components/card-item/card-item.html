<div class="bg-gray-800 rounded-lg p-2 hover:scale-105 transition-transform">
    <img 
        title="card image"
        [src]="card.image_uris?.['normal'] || card.card_faces?.[0]?.image_uris?.['normal']"
        [alt]="card.name"
        class="rounded-md"
    >
    <p class="text-white mt-2 text-sm font-semibold text-center">{{ card.name }}</p>
</div>
